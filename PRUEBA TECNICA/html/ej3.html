<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e9d5ff 40%, #dbeafe 100%);
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

      
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            pointer-events: none;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #c4b5fd, transparent);
            top: -120px;
            left: -100px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #93c5fd, transparent);
            bottom: -100px;
            right: -80px;
        }

       
        .login-card {
            background: #ffffff;
            border: 1px solid rgba(196, 181, 253, 0.3);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow:
                0 25px 60px rgba(109, 40, 217, 0.12),
                0 4px 20px rgba(29, 78, 216, 0.08);
            position: relative;
            z-index: 1;
        }

        
        .login-card__icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6d28d9, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(109, 40, 217, 0.5);
        }

        .login-card__title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #2d1b69;
            text-align: center;
            letter-spacing: -0.02em;
        }

        .login-card__subtitle {
            font-size: 0.9rem;
            color: #7c6fa0;
            text-align: center;
            margin-top: 6px;
            margin-bottom: 36px;
        }

     
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #4c1d95;
            letter-spacing: 0.03em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            pointer-events: none;
            opacity: 0.6;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: #f5f3ff;
            border: 1.5px solid #ddd6fe;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #2d1b69;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .form-group input::placeholder {
            color: #b8aee0;
        }

    
        .form-group input:focus {
            border-color: #7c3aed;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

     
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: #7c3aed;
            text-decoration: none;
            margin-top: -10px;
            margin-bottom: 28px;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #4c1d95;
            text-decoration: underline;
        }

        
        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6d28d9 0%, #4f46e5 50%, #1d4ed8 100%);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 8px 24px rgba(109, 40, 217, 0.45);
        }

        .btn-submit:hover {
            opacity: 0.88;
            transform: translateY(-1px);
            box-shadow: 0 12px 32px rgba(109, 40, 217, 0.55);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

      
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ede9fe;
        }

        .divider span {
            font-size: 0.75rem;
            color: #a78bfa;
            white-space: nowrap;
        }

       
        .login-card__footer {
            text-align: center;
            font-size: 0.875rem;
            color: #7c6fa0;
        }

        .login-card__footer a {
            color: #6d28d9;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid rgba(109, 40, 217, 0.3);
            transition: border-color 0.2s;
        }

        .login-card__footer a:hover {
            border-color: #6d28d9;
        }

        @media (max-width: 1024px) {
            .login-card {
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">

        <div class="login-card__icon">🔐</div>

        <h1 class="login-card__title">Iniciar Sesión</h1>
        <p class="login-card__subtitle">Bienvenido de nuevo, ingresa tus datos</p>

        <form action="#" method="POST" novalidate>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="tucorreo@ejemplo.com"
                        autocomplete="email"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                </div>
            </div>

            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>

            <button type="submit" class="btn-submit">Entrar</button>

        </form>

        <div class="divider"><span>¿Nuevo aquí?</span></div>

        <p class="login-card__footer">
            ¿No tienes cuenta? <a href="#">Regístrate gratis</a>
        </p>

    </div>

</body>
</html>
