<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Perfil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0533 0%, #2d1b69 40%, #1e3a8a 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            width: 320px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(79, 70, 229, 0.25), 0 4px 20px rgba(29, 78, 216, 0.15);
            overflow: hidden;
            text-align: center;
        }

       
        .card__banner {
            height: 100px;
            background: linear-gradient(135deg, #6d28d9 0%, #4f46e5 50%, #1d4ed8 100%);
        }

        /* Contenedor de la foto para superponerla sobre el banner */
        .card__avatar-wrapper {
            margin-top: -48px;
            display: flex;
            justify-content: center;
        }

        .card__avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            background: linear-gradient(135deg, #c4b5fd, #93c5fd);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #4f46e5;
        }

        .card__body {
            padding: 12px 24px 24px;
        }

        .card__name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2d1b69;
            margin-top: 8px;
        }

        .card__role {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 4px;
        }

        .card__divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 16px 0;
        }

      
        .card__stats {
            display: flex;
            justify-content: space-around;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .stat__value {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6d28d9, #1d4ed8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat__label {
            font-size: 0.75rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

     
        @media (max-width: 1024px) {
            .card {
                width: 90%;
                max-width: 360px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card__banner"></div>

        <div class="card__avatar-wrapper">
            <img class="card__avatar" src="Imagen .png" alt="Foto de perfil">
        </div>

        <div class="card__body">
            <h2 class="card__name">Santiago Almanza</h2>
            <p class="card__role">Full Stack Developer</p>

            <hr class="card__divider">

            <div class="card__stats">
                <div class="stat">
                    <span class="stat__value">32</span>
                    <span class="stat__label">Proyectos</span>
                </div>
                <div class="stat">
                    <span class="stat__value">2</span>
                    <span class="stat__label">Años Exp.</span>
                </div>
                <div class="stat">
                    <span class="stat__value">98%</span>
                    <span class="stat__label">Satisfacción</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
